<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#B48554"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C778"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景圆 -->
  <circle cx="32" cy="32" r="30" fill="#F5EDE4"/>

  <!-- 笔记本 -->
  <g transform="translate(10, 12)">
    <!-- 左页 -->
    <path d="M2 4 Q2 0 6 0 L20 0 L20 38 L6 38 Q2 38 2 34 Z" fill="#FFFEF9" stroke="#E8DFD5"/>
    <!-- 右页 -->
    <path d="M22 0 L38 0 Q42 0 42 4 L42 34 Q42 38 38 38 L22 38 Z" fill="#FFFEF9" stroke="#E8DFD5"/>
    <!-- 书脊 -->
    <rect x="20" y="0" width="2" height="38" fill="#D4A574"/>
    <!-- 文字线 -->
    <g stroke="#E8D5C0" stroke-width="1.5" opacity="0.5">
      <line x1="6" y1="8" x2="16" y2="8"/>
      <line x1="6" y1="14" x2="14" y2="14"/>
      <line x1="6" y1="20" x2="16" y2="20"/>
      <line x1="6" y1="26" x2="12" y2="26"/>
      <line x1="26" y1="8" x2="38" y2="8"/>
      <line x1="26" y1="14" x2="36" y2="14"/>
      <line x1="26" y1="20" x2="38" y2="20"/>
    </g>
  </g>

  <!-- 技能星芒 -->
  <g filter="url(#glow)" transform="translate(44, 20)">
    <circle cx="0" cy="0" r="5" fill="url(#glowGrad)"/>
    <g stroke="url(#glowGrad)" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-8" x2="0" y2="-12"/>
      <line x1="0" y1="8" x2="0" y2="12"/>
      <line x1="-8" y1="0" x2="-12" y2="0"/>
      <line x1="8" y1="0" x2="12" y2="0"/>
    </g>
    <g stroke="url(#glowGrad)" stroke-width="1.8" stroke-linecap="round" transform="rotate(45)">
      <line x1="0" y1="-6" x2="0" y2="-9"/>
      <line x1="0" y1="6" x2="0" y2="9"/>
      <line x1="-6" y1="0" x2="-9" y2="0"/>
      <line x1="6" y1="0" x2="9" y2="0"/>
    </g>
  </g>
</svg>