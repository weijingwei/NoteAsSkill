name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Build executable
        run: pyinstaller NoteAsSkill.spec --noconfirm

      - name: Create distribution
        run: |
          cd dist
          Compress-Archive -Path NoteAsSkill.exe -DestinationPath NoteAsSkill-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteAsSkill-Windows
          path: dist/NoteAsSkill-Windows-x64.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Build executable
        run: pyinstaller NoteAsSkill.spec --noconfirm

      - name: Create distribution
        run: |
          cd dist
          tar -czvf NoteAsSkill-Linux-x64.tar.gz NoteAsSkill

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteAsSkill-Linux
          path: dist/NoteAsSkill-Linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Build executable
        run: pyinstaller NoteAsSkill.spec --noconfirm

      - name: Create distribution
        run: |
          cd dist
          zip -r NoteAsSkill-macOS-x64.zip NoteAsSkill.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteAsSkill-macOS
          path: dist/NoteAsSkill-macOS-x64.zip

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/NoteAsSkill-Windows/NoteAsSkill-Windows-x64.zip
            artifacts/NoteAsSkill-Linux/NoteAsSkill-Linux-x64.tar.gz
            artifacts/NoteAsSkill-macOS/NoteAsSkill-macOS-x64.zip
          generate_release_notes: true